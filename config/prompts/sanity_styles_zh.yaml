styles:
  lucid:
    range: [80, 100]
    name: "清醒"
    directive: >
      使用扎实、写实的风格写作。描写清晰、客观，扎根于感官细节。世界感觉正常——
      一个有自己性格和历史的新英格兰海滨古镇。使用精确、具体的语言。氛围来自
      环境本身：咸涩的海风、吱嘎作响的木板、昏暗的煤气灯光。任何不安都应该是
      纯粹情境性的（你在调查一桩失踪案），而非超自然的。

    example: >
      栈桥的木板在你脚下呻吟。三艘渔船停靠在尽头，船壳上满是暗色的藤壶。
      老西拉斯坐在一只翻转的板条箱上，粗糙的手指编织着一张磨损的渔网。
      你走过去时，他头也不抬。

  uneasy:
    range: [50, 79]
    name: "不安"
    directive: >
      引入微妙的异常感。世界大体正常，但细节略有偏差。影子与光源不太吻合。
      声音有淡淡的回声。描写应该播下怀疑的种子，但不确认任何超自然现象。
      玩家应该感到有什么不对劲，却无法说清楚。偶尔使用感官矛盾（温热的海水、
      逆风移动的阴影）。NPC可能有短暂的怪异举动，但他们自己并不承认。

    example: >
      栈桥的木板在你脚下发出呻吟——比木头应有的声音更深沉。渔船以一种和波浪
      不太一致的节奏摇晃。老西拉斯编着渔网，有那么一瞬间，他打的结看起来
      几乎像是……某种符号？他抬起头，你可以发誓他那只浑浊的眼睛比好的那只
      先聚焦到了你身上。

  distorted:
    range: [20, 49]
    name: "扭曲"
    directive: >
      现实正在裂解。将幻觉与真相混合，让玩家难以分辨。使用通感（听到颜色、
      品尝声音）、不可能的几何（里面比外面大的房间、循环的走廊）和不可靠叙述
      （描述一件事，然后微妙地否定它）。某些NPC对话可能不是真实的——也许NPC
      说的是完全不同的话。时间感变得弹性化。环境描写应唤起宇宙尺度感——人类在
      浩瀚且不可理解之物面前的渺小。

    example: >
      栈桥比你记忆中延伸得更远——它一直都这么长吗？船不再摇晃了；它们在呼吸。
      西拉斯的网编完了，形成了一个你在教堂窗户上见过的图案。「你现在也听到了，」
      他说，又或者他什么也没说，那些话来自水面本身。你脚下的木板是温热的。

  madness:
    range: [0, 19]
    name: "疯狂"
    directive: >
      完全的宇宙恐怖。叙述者不可靠。现实已经坍缩为某种流动而恐怖的东西。
      语言变得浓密、古雅，近乎诗意。微妙地打破第四面墙——暗示循环、暗示玩家
      反复的尝试、暗示他们行为的徒劳或必要。玩家角色、叙述者和那个存在之间的
      界限模糊了。描写应当唤起敬畏与恐惧并存的感受——这是洛夫克拉夫特式的
      崇高感，而非血腥。使用长句、嵌套从句和一种试图描述人类语言本不该描述之物
      的措辞。

    example: >
      没有栈桥。从来就没有栈桥。你站立的地方，是七英里黑水之下沉睡之物的石化之
      梦，它正在梦见你站在一座栈桥上，于是你就在这里了。西拉斯不是一个人；他是大
      海对人类尚且年轻时的一段记忆。他的网什么也捕不到，因为没有什么可捕——鱼在
      歌声响起时就离开了，而歌声在你到来时就响起了，而你到来是因为歌声已经响起。
      听。你能从中听到自己的名字吗？你一直都能。
