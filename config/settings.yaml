llm:
  # Supports any OpenAI-compatible API: OpenAI, SiliconFlow, DeepSeek, etc.
  # API key / base_url read from .env
  model: "Pro/zai-org/GLM-4.7"   # Free on SiliconFlow, fastest (~3x vs 32B)
  # model: "Qwen/Qwen3-8B"            # 0.06元/M tokens, newer arch, good balance
  # model: "Qwen/Qwen2.5-32B-Instruct" # Best narrative quality, slowest
  base_url: ""
  temperature: 0.7
  max_tokens: 1024                      # JSON response is ~200-500 tokens; 2048 was wasteful

game:
  max_turns_per_loop: 10
  starting_sanity: 100
  sanity_cap: 100
  time_start: "8:00 PM"
  time_per_turn_minutes: 15
  midnight: "12:00 AM"

consistency:
  embedding_model: "all-MiniLM-L6-v2"
  similarity_threshold: 0.75
  max_retries: 1                        # 1 retry max (2 → 1); avoids worst-case 3x latency
  soft_check: false                     # Disable semantic soft-check in gameplay (dev tool only)

logging:
  trajectory_dir: "logs"
  log_level: "INFO"
